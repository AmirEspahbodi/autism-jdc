model:
  name: "unsloth/llama-3-8b-Instruct-bnb-4bit"
  model_type: "llama3_unsloth"
  max_seq_length: 2048
  load_in_4bit: true
  dtype: "float16"
  double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./outputs/checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  optim: "adamw_8bit"
  bf16: false
  fp16: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1"
  dataloader_num_workers: 0
  gradient_checkpointing: true

data:
  dataset_dir: "./dataset"
  train_file: "train_dataset.json"
  validation_file: "validation_dataset.json"
  test_file: "test_dataset.json"

evaluation:
  checkpoint_path: "./outputs/checkpoints/best_model"
  output_dir: "./outputs"
  batch_size: 1
  max_new_tokens: 512

logging:
  level: "INFO"
  log_file: "./outputs/logs/run.log"
